apiVersion: apps/v1
kind: Deployment
metadata:
  name: e2e-echo
  labels:
    app: e2e-echo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: e2e-echo
  template:
    metadata:
      labels:
        app: e2e-echo
    spec:
      containers:
        - name: httpecho
          image: hashicorp/http-echo:1.0.0
          args:
            - "-listen=:8080"
            - "-text=e2e-ok"
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 1
            periodSeconds: 2
---
apiVersion: v1
kind: Service
metadata:
  name: e2e-echo
spec:
  type: ClusterIP
  selector:
    app: e2e-echo
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: e2e-echo
spec:
  ingressClassName: caddy
  rules:
    - host: e2e.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: e2e-echo
                port:
                  number: 8080

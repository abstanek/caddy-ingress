name: Pre-release (GHCR)

# Manually-triggered pre-release build. Builds the controller image from
# source (Dockerfile.dev) and pushes it to this repository's GitHub
# Container Registry namespace. Auth uses the built-in GITHUB_TOKEN, so no
# extra secrets are required.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to publish (default: pre-<short-sha>)"
        required: false
        default: ""

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    name: Build and push to GHCR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image reference
        id: meta
        run: |
          # GHCR requires a lowercase image path.
          image="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          tag="${{ github.event.inputs.tag }}"
          if [ -z "$tag" ]; then
            tag="pre-$(git rev-parse --short HEAD)"
          fi
          {
            echo "image=$image"
            echo "version_tag=$image:$tag"
            echo "moving_tag=$image:pre-release"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.dev
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.meta.outputs.version_tag }}
            ${{ steps.meta.outputs.moving_tag }}
          labels: |
            org.opencontainers.image.title=ingress
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.created=${{ github.event.repository.updated_at }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          {
            echo "### Pre-release image pushed"
            echo ""
            echo '- `${{ steps.meta.outputs.version_tag }}`'
            echo '- `${{ steps.meta.outputs.moving_tag }}`'
          } >> "$GITHUB_STEP_SUMMARY"
